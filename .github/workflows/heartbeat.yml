name: Supabase Heartbeat

on:
  schedule:
    # Daily at 06:00 UTC — keeps Supabase free tier from pausing
    - cron: '0 6 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Insert heartbeat row
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/heartbeat" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"source": "github_actions"}')

          status=$(echo "$response" | tail -n1)
          echo "HTTP status: $status"

          if [ "$status" != "201" ] && [ "$status" != "200" ]; then
            echo "Heartbeat failed"
            echo "$response"
            exit 1
          fi

          echo "Heartbeat sent successfully"